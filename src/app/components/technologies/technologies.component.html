<section class="py-10">
  <div class="container">
    <h1 data-aos="fade-down" class="text-3xl lg:text-5xl font-bold text-main mb-10">Technologies</h1>
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-6">
      @for (technology of technologiesList(); track technology.id) {
        <div data-aos="fade-up" class="box h-36 bg-[#0B1120] flex items-center justify-center border-4 border-neutral-800 rounded-lg relative group">
          <img [src]="technology.image" loading="lazy" class="w-20 transition duration-500 hover:scale-110" [alt]="technology.title" />
          <span class="absolute -top-10 left-1/2 -translate-x-1/2 bg-gray-900 text-white text-xs px-3 py-1 rounded-lg shadow-lg opacity-0 group-hover:opacity-100 translate-y-2 group-hover:translate-y-0 transition-all duration-300 whitespace-nowrap">
            {{ technology.title }}
          </span>
        </div>
      }
    </div>
  </div>
</section>
